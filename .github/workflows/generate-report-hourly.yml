name: Generate RSS trend report (hourly sites)

on:
  workflow_dispatch:
  schedule:
    # Hourly refresh (keeps site feeds fresh)
    - cron: '10 * * * *'

permissions:
  contents: write

concurrency:
  group: generate-report
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore cache (feeds + Reddit meta)
        uses: actions/cache@v4
        with:
          path: cache
          key: rss-trend-cache-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            rss-trend-cache-${{ runner.os }}-${{ github.ref_name }}-

      - name: Generate report
        env:
          REPORT_LANG: en
          REPORT_LOOKBACK_HOURS: 36
          REPORT_WEEK_DAYS: 7
          MAX_ITEMS_PER_FEED: 30

          # Reddit: do NOT hit Reddit API hourly. Use cached meta only.
          REDDIT_META_MODE: cache
          REDDIT_FALLBACK_ENABLED: 0
          REDDIT_META_MAX_FETCH: 0
          REDDIT_CONCURRENCY: 1
          REDDIT_META_CACHE_HOURS: 720

          # If OAuth is configured, daily job will fill cache.
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
        run: node scripts/generate-report.mjs

      - name: Commit changes (if any)
        run: |
          git status --porcelain
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes."
            exit 0
          fi
          git add reports/**/*.md reports/*.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Update hourly trend report"
          git push

