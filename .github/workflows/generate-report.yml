name: Generate RSS trend report

on:
  workflow_dispatch:
  schedule:
    # Hourly refresh (keeps site feeds fresh)
    - cron: '10 * * * *'
    # 08:00 MSK (UTC+3) = 05:00 UTC
    - cron: '0 5 * * *'
    # Weekly: Monday 08:00 MSK (UTC+3) = 05:00 UTC
    - cron: '0 5 * * 1'

permissions:
  contents: write

concurrency:
  group: generate-report
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Restore cache (feeds + Reddit meta)
        uses: actions/cache@v4
        with:
          path: cache
          key: rss-trend-cache-${{ runner.os }}-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            rss-trend-cache-${{ runner.os }}-${{ github.ref_name }}-

      - name: Generate report
        env:
          REPORT_LANG: en
          REPORT_LOOKBACK_HOURS: 36
          REPORT_WEEK_DAYS: 7
          REDDIT_MIN_COMMENTS: 10
          REDDIT_MIN_SCORE: 50
          REDDIT_COMMENT_WEIGHT: 3
          REDDIT_CONCURRENCY: 2
          # Ensure Reddit doesn't disappear when meta fetch hits 429/limits
          REDDIT_FALLBACK_ENABLED: 1
          REDDIT_FALLBACK_MIN_TODAY: 6
          REDDIT_FALLBACK_MIN_WEEK: 12
          REDDIT_META_RETRY_429: 1
          # Reduce rate-limit pain: cache & cap meta calls
          REDDIT_META_CACHE_HOURS: 12
          REDDIT_META_MAX_FETCH: 80
          MAX_ITEMS_PER_FEED: 30
        run: node scripts/generate-report.mjs

      - name: Commit changes (if any)
        run: |
          git status --porcelain
          if [ -z "$(git status --porcelain)" ]; then
            echo "No changes."
            exit 0
          fi
          git add reports/**/*.md reports/*.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Update daily trend report"
          git push

